<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#176b5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AI秘書">
    <meta name="application-name" content="AI秘書">
    <meta name="description" content="毎日の予定、会話、連絡先、お金を上品に整えるAI秘書アプリ">
    <title>AI秘書</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}?v=20260614-icon">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=20260614-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=20260614-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}?v=20260614-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='license.js') }}?v=20260615-auto-key" defer></script>
    <script src="{{ url_for('static', filename='voice.js') }}" defer></script>
    <script src="{{ url_for('static', filename='pwa.js') }}" defer></script>
    <script src="{{ url_for('static', filename='display_settings.js') }}" defer></script>
    <script src="{{ url_for('static', filename='camera.js') }}" defer></script>
    <script src="{{ url_for('static', filename='business_card_ocr.js') }}?v=20260615-card-ocr" defer></script>
    <script src="{{ url_for('static', filename='recording.js') }}?v=20260614-recording-tap" defer></script>
    <script src="{{ url_for('static', filename='summary.js') }}" defer></script>
    <script src="{{ url_for('static', filename='consult.js') }}?v=20260614-route" defer></script>
    <script src="{{ url_for('static', filename='calculator.js') }}" defer></script>
    <script src="{{ url_for('static', filename='weather.js') }}" defer></script>
    <script src="{{ url_for('static', filename='travel.js') }}" defer></script>
    <script src="{{ url_for('static', filename='google_calendar.js') }}" defer></script>
    <script src="{{ url_for('static', filename='fortune.js') }}?v=20260615-schedule-fortune" defer></script>
    <script src="{{ url_for('static', filename='writer.js') }}" defer></script>
    <script src="{{ url_for('static', filename='home_voice.js') }}?v=20260614-two-stage-mic" defer></script>
    <script src="{{ url_for('static', filename='app_tabs.js') }}" defer></script>
  </head>
  <body class="is-locked theme-{{ settings.design_theme|default('dark-secretary') }}">
    {% include "components/license_gate.html" %}
    <header class="mobile-app-header" aria-label="アプリヘッダー">
      <span class="app-logo-frame mobile-app-logo-frame">
        <img src="{{ url_for('static', filename='app_logo.png') }}" alt="AI秘書ロゴ" class="mobile-app-logo">
      </span>
      <div>
        <strong>AI秘書</strong>
        <span>{{ current_datetime.date }}</span>
      </div>
    </header>

    {% include "components/home.html" %}

    <nav class="bottom-tab-nav" aria-label="下部メニュー">
      <button class="is-active" type="button" data-tab-target="home" aria-current="page">ホーム</button>
      <button type="button" data-tab-target="schedule">予定</button>
      <button type="button" data-tab-target="talk">会話</button>
      <button type="button" data-tab-target="money">お金</button>
      <button type="button" data-tab-target="settings">設定</button>
    </nav>
  </body>
</html>
