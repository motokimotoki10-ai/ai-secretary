<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#176b5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AI秘書">
    <meta name="application-name" content="AI秘書">
    <meta name="description" content="毎日の予定、会話、連絡先、お金を上品に整えるAI秘書アプリ">
    <title>アプリ情報 | AI秘書</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}?v=20260614-icon">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=20260614-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=20260614-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}?v=20260614-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='license.js') }}" defer></script>
    <script src="{{ url_for('static', filename='pwa.js') }}" defer></script>
  </head>
  <body class="is-locked theme-{{ settings.design_theme|default('dark-secretary') }}">
    {% include "components/license_gate.html" %}
    <main class="app-shell app-info-page">
      <header class="app-header app-info-hero">
        <div class="brand-row">
          <span class="app-logo-frame home-logo-frame">
            <img src="{{ url_for('static', filename='app_logo.png') }}" alt="AI秘書ロゴ" class="app-logo">
          </span>
          <div>
            <p class="eyebrow">アプリ情報</p>
            <h1>AI秘書</h1>
          </div>
        </div>
        <p class="app-info-tagline">予定、会話、名刺、お金をひとつにまとめ、毎日を静かに支えるAI秘書アプリです。</p>
        <a class="future-back-link" href="{{ url_for('index') }}">ホームへ戻る</a>
      </header>

      <section class="app-info-section">
        <h2>このアプリでできること</h2>
        <div class="app-info-feature-grid">
          <span>会話整理</span>
          <span>タスク管理</span>
          <span>予定管理</span>
          <span>名刺管理</span>
          <span>お金管理</span>
          <span>文章作成</span>
        </div>
      </section>

      <section class="app-info-section">
        <h2>バージョン</h2>
        <p class="app-info-version">v6.0</p>
      </section>

      <section class="app-info-message">
        <h2>メッセージ</h2>
        <p>このアプリは、初めての方でも迷わず使えるように整えたプレゼント版AI秘書です。</p>
        <a class="future-features-link secondary-link" href="{{ url_for('update_history') }}">更新履歴を見る</a>
      </section>
    </main>
    <a class="home-return-fab" href="{{ url_for('index') }}" aria-label="ホームへ戻る">ホーム</a>
  </body>
</html>
