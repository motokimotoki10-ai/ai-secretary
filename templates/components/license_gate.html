<section id="licenseGate" class="license-gate" aria-label="利用キー入力">
  <div class="license-panel">
    <p class="license-eyebrow">AI秘書</p>
    <h1>利用キーを入力</h1>
    <p class="license-description">プレゼント版AI秘書を安全に使うため、利用キーを確認します。</p>
    <form id="licenseForm" class="license-form">
      <label for="licenseKeyInput">利用キー</label>
      <input
        id="licenseKeyInput"
        name="license_key"
        type="password"
        inputmode="text"
        autocomplete="off"
        placeholder="キーを入力"
        required
      >
      <button type="submit" class="primary-action">はじめる</button>
    </form>
    <p id="licenseMessage" class="license-message" aria-live="polite"></p>
  </div>
</section>
