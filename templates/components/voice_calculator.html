<section class="voice-calculator-section">
  <h2>🧮 音声計算機</h2>
  <label for="voiceCalculatorInput">計算したい内容</label>
  <textarea
    id="voiceCalculatorInput"
    class="voice-calculator-input"
    placeholder="3000円を15個&#10;120万円から35万円引く&#10;150万円の10%"
  ></textarea>
  <div class="voice-calculator-actions">
    <button type="button" id="voiceCalculatorFromMemoButton" class="voice-calculator-secondary">
      メモ入力を使う
    </button>
    <button type="button" id="voiceCalculatorButton" class="voice-calculator-primary">
      計算する
    </button>
  </div>
  <div class="voice-calculator-result">
    <h3>計算結果</h3>
    <p id="voiceCalculatorResultText">計算したい内容を入力してください。</p>
  </div>
</section>
