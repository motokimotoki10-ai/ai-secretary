<section class="display-settings" aria-label="見やすさ設定">
  <h2>文字とボタンの大きさ</h2>
  <p>小さく感じる時は「大きめ」を選ぶと、スマホでも押しやすくなります。</p>
  <fieldset>
    <legend>表示サイズ</legend>
    <label>
      <input type="radio" name="displaySize" value="standard" checked>
      標準
    </label>
    <label>
      <input type="radio" name="displaySize" value="large">
      大きめ
    </label>
    <label>
      <input type="radio" name="displaySize" value="xlarge">
      特大
    </label>
  </fieldset>
  <fieldset>
    <legend>ボタンサイズ</legend>
    <label>
      <input type="radio" name="buttonSize" value="standard" checked>
      標準
    </label>
    <label>
      <input type="radio" name="buttonSize" value="large">
      大きめ
    </label>
  </fieldset>
</section>
