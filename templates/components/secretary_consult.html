<section class="secretary-consult-section">
  <h2>秘書に依頼</h2>
  <div class="secretary-router-box">
    <label for="secretaryRouteInput">内容を見て振り分ける</label>
    <textarea
      id="secretaryRouteInput"
      class="secretary-consult-input secretary-route-input"
      placeholder="例：明日14時に歯医者&#10;例：今日の昼は1200円&#10;例：買い物を忘れないように"
    ></textarea>
    <button type="button" id="secretaryRouteButton" class="secretary-consult-button secretary-route-button">
      秘書に振り分けてもらう
    </button>
    <p id="secretaryRouteStatus" class="secretary-consult-status" aria-live="polite"></p>
    <div id="secretaryRouteResult" class="secretary-route-result" aria-live="polite"></div>
  </div>

  <h3>相談する</h3>
  <label for="secretaryConsultInput">相談内容</label>
  <textarea
    id="secretaryConsultInput"
    class="secretary-consult-input"
    placeholder="今日何からやればいい？&#10;請求書は急ぐ？&#10;山田さんへ連絡した方がいい？"
  ></textarea>
  <button type="button" id="secretaryConsultButton" class="secretary-consult-button">
    相談する
  </button>
  <p id="secretaryConsultStatus" class="secretary-consult-status" aria-live="polite"></p>
  <div class="secretary-consult-history">
    <h3>回答履歴</h3>
    <div id="secretaryConsultHistoryList" class="secretary-consult-history-list">
      <p class="empty">まだ相談履歴はありません。</p>
    </div>
  </div>
</section>
