<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#176b5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AI秘書">
    <meta name="application-name" content="AI秘書">
    <meta name="description" content="毎日の予定、会話、連絡先、お金を上品に整えるAI秘書アプリ">
    <title>更新履歴 | AI秘書</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}?v=20260614-icon">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=20260614-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=20260614-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}?v=20260614-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='license.js') }}?v=20260615-auto-key" defer></script>
    <script src="{{ url_for('static', filename='pwa.js') }}" defer></script>
  </head>
  <body class="is-locked theme-{{ settings.design_theme|default('dark-secretary') }}">
    {% include "components/license_gate.html" %}
    <main class="app-shell update-history-page">
      <header class="app-header future-hero">
        <div class="brand-row">
          <span class="app-logo-frame home-logo-frame">
            <img src="{{ url_for('static', filename='app_logo.png') }}" alt="AI秘書ロゴ" class="app-logo">
          </span>
          <div>
            <p class="eyebrow">更新履歴</p>
            <h1>更新履歴</h1>
          </div>
        </div>
        <p class="lead">AI秘書をプレゼント版として磨いてきた記録です。</p>
        <a class="future-back-link" href="{{ url_for('index') }}">ホームへ戻る</a>
      </header>

      <section class="update-history-section">
        {% for history in history_items %}
        <article class="update-history-card">
          <div class="update-history-head">
            <span>{{ history.version }}</span>
            <strong>{{ history.label }}</strong>
          </div>
          <ul>
            {% for item in history.changes %}
            <li>{{ item }}</li>
            {% endfor %}
          </ul>
        </article>
        {% endfor %}
      </section>
    </main>
    <a class="home-return-fab" href="{{ url_for('index') }}" aria-label="ホームへ戻る">ホーム</a>
  </body>
</html>
