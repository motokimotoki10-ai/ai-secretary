services:
  - type: web
    name: ai-secretary-v01
    env: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: AI_SECRETARY_SECRET_KEY
        generateValue: true
      - key: AI_SECRETARY_LICENSE_KEY
        sync: false
      - key: AI_SECRETARY_ADMIN_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
